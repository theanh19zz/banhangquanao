        .tracking-info {
            margin-top: 25px;
            padding: 15px;
            background: #fdfdfd;
            border: 1px solid #eee;
            border-radius: 10px;
            text-align: left;
        }

        .tracking-header {
            font-weight: 600;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #333;
            font-family: 'Poppins', sans-serif;
        }

        .delivery-progress {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
            position: relative;
        }

        .delivery-progress::before {
            content: "";
            position: absolute;
            top: 12px;
            left: 5%;
            width: 90%;
            height: 2px;
            background: #e0e0e0;
            z-index: 0;
        }

        .progress-step {
            z-index: 1;
            text-align: center;
            font-size: 10px;
            width: 25%;
        }

        .step-dot {
            width: 24px;
            height: 24px;
            background: #e0e0e0;
            border-radius: 50%;
            margin: 0 auto 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .progress-step.active .step-dot {
            background: #27ae60;
        }

        .map-box {
            margin-top: 15px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #ddd;
            height: 200px;
        }
    </style>

    <!-- Script mô phỏng gửi đơn hàng về hệ thống Admin -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            // 1. Lấy thông tin từ giao diện checkout (được JS có sẵn điền vào)
            // Lưu ý: Trong thực tế, dữ liệu này nên lấy từ biến JS hoặc Cart Object
            const orderId = document.getElementById('id_order').innerText || Math.floor(Math.random() * 10000);
            const total = document.getElementById('total_price').innerText;
            const date = new Date().toLocaleString('vi-VN');

            // Cập nhật nội dung chuyển khoản tự động theo mã đơn hàng
            document.getElementById('transfer_content').innerText = "THANHTOAN " + orderId;

            // Cập nhật ngày hiển thị nếu chưa có
            document.getElementById('order_date').innerText = date;

            // Tự động tính thời gian dự kiến giao hàng (từ 3 đến 5 ngày tới)
            const d = new Date();
            const start = new Date(); start.setDate(d.getDate() + 3);
            const end = new Date(); end.setDate(d.getDate() + 5);
            const options = { day: '2-digit', month: '2-digit' };
            const estStr = `${start.toLocaleDateString('vi-VN', options)} - ${end.toLocaleDateString('vi-VN', options)}, ${end.getFullYear()}`;
            document.getElementById('est_delivery').innerText = estStr;

            // Cập nhật tiến trình dựa trên trạng thái Admin đã duyệt hay chưa
            let existingOrders = JSON.parse(localStorage.getItem('admin_orders')) || [];
            const currentOrder = existingOrders.find(o => o.id == orderId);
            if (currentOrder && currentOrder.status === 'Xong') {
                const steps = document.querySelectorAll('.progress-step');
                steps[1].classList.add('active'); // Bước Xử lý
                steps[2].classList.add('active'); // Bước Đang giao
            }

            // 2. Tạo đối tượng đơn hàng
            const cartItems = JSON.parse(localStorage.getItem('cart')) || [];
            const newOrder = {
                id: orderId,
                total: total,
                date: date,
                customer: "Khách hàng " + Math.floor(Math.random() * 100), // Giả lập tên khách
                items: cartItems, // Lưu danh sách sản phẩm kèm size/màu
                status: "Mới"
            };

            // 3. Lấy danh sách đơn hàng cũ từ LocalStorage
            // Kiểm tra xem đơn hàng này đã lưu chưa (tránh F5 lưu trùng)
            const exists = existingOrders.some(o => o.id == newOrder.id && o.date === newOrder.date);

            if (!exists) {
                existingOrders.push(newOrder);
                // 4. Lưu lại vào LocalStorage để trang Admin đọc được
                localStorage.setItem('admin_orders', JSON.stringify(existingOrders));
                console.log("Đơn hàng đã được gửi tới Admin Dashboard");
            }
        });
    </script>
